version: "3.8"

services:
  kroxy:
    build: .
    image: kroxy:latest
    container_name: kroxy
    restart: unless-stopped

    # Security: Run as non-root
    user: "1000:1000"

    # Security: Read-only root filesystem with tmpfs for writes
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/kroxy/.config:size=10M,mode=1777
      - /home/kroxy/.local:size=10M,mode=1777

    # Security: Drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for ports < 1024

    # Security: Prevent privilege escalation
    privileged: false
    security_opt:
      - no-new-privileges:true

    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "127.0.0.1:8080:8080"  # Admin API - localhost only

    volumes:
      - kroxy-data:/data

    environment:
      - KROXY_PROXY=:80
      - KROXY_ADMIN=:8080
      - KROXY_DB=/data/kroxy.db
      - KROXY_ADMIN_TOKEN_FILE=/data/admin_token
      - KROXY_PRODUCTION=false
      - KROXY_ALLOW_PRIVATE_BACKENDS=true

    networks:
      default:
        ipv4_address: 172.28.0.2

    depends_on:
      cafe:
        condition: service_started

    labels:
      - "com.kroxy.description=Self-hosted reverse proxy with WAF and OIDC"
      - "com.kroxy.security=hardened"

    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://127.0.0.1:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"

  cafe:
    image: nginx:alpine
    container_name: kroxy-cafe
    restart: unless-stopped
    volumes:
      - ./cafe:/usr/share/nginx/html:ro
      - ./cafe/nginx.conf:/etc/nginx/conf.d/cafe.conf:ro
    networks:
      default:
        ipv4_address: 172.28.0.3
        aliases:
          - cafe.test

volumes:
  kroxy-data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16