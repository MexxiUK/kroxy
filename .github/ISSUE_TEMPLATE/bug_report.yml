name: Bug Report
description: Report a bug in Kroxy
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `kroxy --listen :443`
        2. Make a request to `https://example.com/api/test`
        3. Observe error in logs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kroxy Version
      placeholder: "e.g., v0.2.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Docker version, Go version, etc.
      placeholder: |
        OS: Ubuntu 22.04
        Docker: 24.0.5
        Go: 1.22