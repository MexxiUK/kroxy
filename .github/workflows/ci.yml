name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GOSEC_EXCLUDES: "G104,G307,G115"

jobs:
  fast-check:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 ./...

  test-race:
    name: Race Detector
    needs: [fast-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  security:
    name: Security Scan
    needs: [fast-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.3

      - name: Run gosec
        run: gosec -exclude=${{ env.GOSEC_EXCLUDES }} ./...

      - name: Run Semgrep
        # Pin to the last pre-v1 wrapper that forwards flags directly to the Semgrep CLI,
        # avoiding the severity-parsing regression in the v1 action.
        uses: semgrep/semgrep-action@v0.58.0
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten


  lint:
    name: Lint
    needs: [fast-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install golangci-lint
        # Build from source with the local Go toolchain to avoid prebuilt binary Go-version mismatch.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.2.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

  coverage:
    name: Coverage Report
    needs: [fast-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Generate coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Report coverage
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E "^github.com/kroxy/kroxy/internal/" | awk '{print "| " $1 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** $(go tool cover -func=coverage.out | grep total | awk '{print $3}')" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Binaries
    needs: [test-race, security, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.sha }}" -o bin/kroxy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/kroxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kroxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/kroxy-*

  docker:
    name: Build Docker Image
    needs: [test-race, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: kroxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kroxy:${{ github.sha }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 1

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: kroxy-*/kroxy-*
          generate_release_notes: true
