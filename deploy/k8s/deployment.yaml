apiVersion: apps/v1
kind: Deployment
metadata:
  name: kroxy
  namespace: kroxy
  labels:
    app.kubernetes.io/name: kroxy
    app.kubernetes.io/component: server
spec:
  # CRITICAL: SQLite requires single replica
  # For HA, consider migrating to PostgreSQL/MySQL
  replicas: 1
  strategy:
    type: Recreate  # Required for SQLite PVC - prevents concurrent access
  selector:
    matchLabels:
      app.kubernetes.io/name: kroxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kroxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Security: Run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Security: Init container to fix permissions
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chmod 750 /data && chown 1000:1000 /data']
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0

      containers:
        - name: kroxy
          image: kroxy:latest  # Overridden by kustomization.yaml images transformer
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: admin
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: kroxy-config
            - secretRef:
                name: kroxy-secrets

          env:
            - name: KROXY_ADMIN_TOKEN_FILE
              value: "/secrets/admin-token/token"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Liveness probe - checks if process is running
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - checks if ready to accept traffic
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe - allows slow startup
          startupProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # Allow up to 150s startup

          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          volumeMounts:
            - name: data
              mountPath: /data
            - name: admin-token
              mountPath: /secrets/admin-token
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kroxy-data
        - name: admin-token
          secret:
            secretName: kroxy-admin-token
            items:
              - key: token
                path: token
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

      # Node affinity for production workloads
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - arm64

      terminationGracePeriodSeconds: 30