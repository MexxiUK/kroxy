apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kroxy

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

