apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kroxy

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

images:
  - name: kroxy
    newName: ghcr.io/mexxiuk/kroxy
    newTag: latest

# To pin to a specific release, override the tag:
#   kustomize edit set image kroxy=ghcr.io/mexxiuk/kroxy:v1.0.0
