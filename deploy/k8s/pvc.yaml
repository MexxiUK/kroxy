apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kroxy-data
  namespace: kroxy
  labels:
    app.kubernetes.io/name: kroxy
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Adjust storage class based on your cluster
  # storageClassName: standard