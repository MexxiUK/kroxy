apiVersion: v1
kind: Service
metadata:
  name: kroxy
  namespace: kroxy
  labels:
    app.kubernetes.io/name: kroxy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
  selector:
    app.kubernetes.io/name: kroxy
---
# Headless service for direct pod access (metrics scraping, debugging)
# Admin port 8080 is intentionally NOT exposed here. Use kubectl port-forward
# for admin access: kubectl port-forward pod/<name> 8080:8080 -n kroxy
apiVersion: v1
kind: Service
metadata:
  name: kroxy-headless
  namespace: kroxy
  labels:
    app.kubernetes.io/name: kroxy
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
  selector:
    app.kubernetes.io/name: kroxy