version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - bodyclose
    - misspell
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - gosec
  disable:
    - staticcheck   # Style-only suggestions; too noisy during MVP sprint
    - unused        # Inherited untested code; re-enable after cleanup
    - noctx         # Legacy HTTP calls across the codebase
    - revive        # Doc-comment requirements; too noisy during MVP sprint
    - unconvert     # Legacy code has many harmless conversions
    - prealloc      # Micro-optimization; not worth blocking CI during MVP sprint
    - errchkjson    # False positives on API handlers
    - wrapcheck     # Too strict for MVP phase
    - goconst       # Noisy on SQL strings
    - errcheck      # Too many unchecked errors in existing codebase; enable after cleanup

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

linters-settings:
  misspell:
    locale: US
  gosec:
    excludes:
      - G104  # Unhandled errors (covered by errcheck)
      - G307  # Deferring unsafe Close
      - G115  # Integer overflow conversion
