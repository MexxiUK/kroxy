run:
  timeout: 5m
  issues-exit-code: 1

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - gosimple
    - typecheck
    - prealloc
    - gofmt
    - misspell
    - goimports
    - nakedret
    - rowserrcheck
    - sqlclosecheck
  disable:
    - errcheck
    - unused
    - goconst
    - unconvert

linters-settings:
  gofmt:
    simplify: true
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - linters:
        - staticcheck
      text: "SA1029"
