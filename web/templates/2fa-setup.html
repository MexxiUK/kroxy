{{ define "2fa-setup" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <title>Set Up Two-Factor Authentication - Kroxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style nonce="{{ nonce }}">
        {{ template "auth-css" }}
        .qr-container { margin: 1rem auto; width: 200px; height: 200px; background: var(--bg-secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .secret-code { font-size: 0.875rem; background: var(--bg-secondary); padding: 0.375rem 0.75rem; border-radius: 6px; letter-spacing: 0.05em; word-break: break-all; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <svg class="logo-icon" width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="rgba(22,163,74,0.1)"/>
                <path d="M16 4 L26 8 L26 16 Q26 26 16 29 Q6 26 6 16 L6 8 Z" stroke="#16a34a" stroke-width="2" fill="none"/>
                <circle cx="11" cy="13" r="2.5" fill="#16a34a"/>
                <circle cx="21" cy="13" r="2.5" fill="#16a34a"/>
                <circle cx="16" cy="22" r="2.5" fill="#16a34a"/>
                <line x1="11" y1="13" x2="21" y2="13" stroke="#16a34a" stroke-width="2"/>
                <line x1="11" y1="13" x2="16" y2="22" stroke="#16a34a" stroke-width="2"/>
                <line x1="21" y1="13" x2="16" y2="22" stroke="#16a34a" stroke-width="2"/>
            </svg>
            <div>
                <div class="logo-text">Kroxy</div>
                <div class="logo-subtitle">Secure your account</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h1>Set up two-factor authentication</h1>
                <p>Scan the QR code with your authenticator app, then enter the 6-digit code</p>
            </div>

            <div id="setup-content" style="text-align: center;">
                <div class="qr-container" id="qr-container">
                    <span style="color: var(--text-muted); font-size: 0.875rem;">Loading...</span>
                </div>
                <div style="margin: 1rem 0;">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Can't scan? Enter this code manually:</p>
                    <code class="secret-code" id="totp-secret-display"></code>
                </div>
                <div class="form-group" style="text-align: left; margin-top: 1.5rem;">
                    <label class="form-label" for="totp-verify-code">Verification Code</label>
                    <input type="text" id="totp-verify-code" class="form-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" style="text-align: center; letter-spacing: 0.5em; font-size: 1.25rem;">
                </div>
                <div id="totp-error" class="error" style="display: none;"></div>
                <button type="button" class="btn btn-primary" id="totp-verify-btn" style="margin-top: 0.75rem;">Verify and Enable</button>
            </div>
        </div>
    </div>

    <script nonce="{{ nonce }}">
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
        let totpSecret = '';
        let totpURI = '';

        async function loadTOTPSetup() {
            try {
                const response = await fetch('/api/user/2fa/setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    const data = await response.json();
                    showError(data.error || 'Failed to load TOTP setup');
                    return;
                }

                const data = await response.json();
                totpSecret = data.secret;
                totpURI = data.uri;

                document.getElementById('totp-secret-display').textContent = data.secret;

                // Generate QR code using a simple data URI approach
                const qr = document.createElement('img');
                qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(data.uri);
                qr.style.width = '200px';
                qr.style.height = '200px';
                qr.style.borderRadius = '12px';
                qr.alt = 'TOTP QR Code';

                const container = document.getElementById('qr-container');
                container.innerHTML = '';
                container.appendChild(qr);
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }

        async function verifyTOTP() {
            const code = document.getElementById('totp-verify-code').value.trim();
            if (!code || code.length !== 6) {
                showError('Please enter a 6-digit code');
                return;
            }

            const btn = document.getElementById('totp-verify-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const response = await fetch('/api/user/2fa/enable', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Invalid code');
                    btn.disabled = false;
                    btn.textContent = 'Verify and Enable';
                    return;
                }

                // Success — redirect to dashboard
                window.location.href = '/dashboard';
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Verify and Enable';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('totp-error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        document.getElementById('totp-verify-btn').addEventListener('click', verifyTOTP);
        document.getElementById('totp-verify-code').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verifyTOTP();
        });

        loadTOTPSetup();
    </script>
</body>
</html>
{{ end }}
