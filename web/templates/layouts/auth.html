<script nonce="{{ nonce }}">
(function() {
    var sidebar = document.getElementById('sidebar');
    var backdrop = document.getElementById('sidebar-backdrop');
    var toggleBtn = document.getElementById('sidebar-toggle');

    function initSidebar() {
        if (window.innerWidth > 768) {
            var collapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            document.body.classList.toggle('sidebar-collapsed', collapsed);
        } else {
            document.body.classList.remove('sidebar-collapsed');
            document.body.classList.remove('sidebar-open');
        }
    }

    function toggleSidebar() {
        if (window.innerWidth <= 768) {
            document.body.classList.toggle('sidebar-open');
            if (backdrop) backdrop.classList.toggle('active', document.body.classList.contains('sidebar-open'));
        } else {
            document.body.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebar-collapsed', document.body.classList.contains('sidebar-collapsed'));
        }
    }

    function closeSidebar() {
        document.body.classList.remove('sidebar-open');
        if (backdrop) backdrop.classList.remove('active');
    }

    if (toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
    if (backdrop) backdrop.addEventListener('click', closeSidebar);

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSidebar();
    });

    var resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            if (window.innerWidth > 768) {
                closeSidebar();
                initSidebar();
            } else {
                document.body.classList.remove('sidebar-collapsed');
            }
        }, 150);
    });

    // User menu dropdown
    var userMenuBtn = document.getElementById('user-menu-btn');
    var userMenu = document.getElementById('user-menu');

    userMenuBtn.addEventListener('click', function() {
        var isOpen = userMenu.classList.toggle('active');
        userMenuBtn.setAttribute('aria-expanded', isOpen);
        if (isOpen) {
            var first = userMenu.querySelector('[role="menuitem"], .dropdown-item');
            if (first) first.focus();
        }
    });

    userMenu.addEventListener('keydown', function(e) {
        var items = userMenu.querySelectorAll('[role="menuitem"], .dropdown-item button');
        if (!items.length) return;
        var current = Array.prototype.indexOf.call(items, document.activeElement) || Array.prototype.indexOf.call(items, document.activeElement.closest('[role="menuitem"]'));
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            var next = (current + 1) % items.length;
            items[next].focus();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            var prev = (current - 1 + items.length) % items.length;
            items[prev].focus();
        } else if (e.key === 'Escape') {
            userMenu.classList.remove('active');
            userMenuBtn.setAttribute('aria-expanded', 'false');
            userMenuBtn.focus();
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown-menu').forEach(function(menu) {
                menu.classList.remove('active');
            });
            userMenuBtn.setAttribute('aria-expanded', 'false');
        }
    });

    initSidebar();
})();
</script>
{{ end }}
