version: "3.8"

services:
  kroxy:
    build: .
    image: kroxy:latest
    container_name: kroxy
    restart: unless-stopped

    # Security: Run as non-root
    user: "1000:1000"

    # Security: Read-only root filesystem with tmpfs for writes
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

    # Security: Drop all capabilities, add only what's needed.
    # Named volumes inherit the ownership of /data and /home/kroxy from the
    # image, so SQLite can create files without the CHOWN capability.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for ports < 1024

    # Security: Prevent privilege escalation
    privileged: false
    security_opt:
      - no-new-privileges:true

    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS
      - "127.0.0.1:8080:8080"  # Admin API (localhost only!)

    volumes:
      - kroxy-data:/data
      - kroxy-certs:/home/kroxy/.local/share/caddy

    environment:
      - KROXY_PROXY=:80            # HTTP listener (redirects to HTTPS)
      - KROXY_HTTPS_ADDR=:443      # HTTPS listener
      - KROXY_ADMIN=127.0.0.1:8080 # Admin API bound to localhost inside container
      - KROXY_DB=/data/kroxy.db
      - KROXY_PRODUCTION=true
      # Generate persistent secrets with: openssl rand -base64 32
      - KROXY_ENCRYPTION_KEY=${KROXY_ENCRYPTION_KEY:?KROXY_ENCRYPTION_KEY is required}
      - KROXY_JWT_SECRET=${KROXY_JWT_SECRET:?KROXY_JWT_SECRET is required}
      - KROXY_WAF_SIGNING_KEY=${KROXY_WAF_SIGNING_KEY:?KROXY_WAF_SIGNING_KEY is required}
      # TLS Configuration
      - KROXY_TLS_ENABLED=true
      - KROXY_AUTO_HTTPS=true
      - KROXY_ACME_EMAIL=${KROXY_ACME_EMAIL:?KROXY_ACME_EMAIL is required}
      - KROXY_REDIRECT_HTTP=true
      - KROXY_HSTS_ENABLED=true

    labels:
      - "com.kroxy.description=Self-hosted reverse proxy with WAF and OIDC"
      - "com.kroxy.security=hardened"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Security: Limit resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

    # Security: Log configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"

volumes:
  kroxy-data:
    driver: local
  kroxy-certs:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16